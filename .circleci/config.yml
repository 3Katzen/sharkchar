version: 2.1

# Define the jobs to be executed
jobs:
  build_and_test:
    docker:
      # Drupal 11 requires PHP 8.3
      - image: cimg/php:8.3
    steps:
      - checkout

      # Install project dependencies using Composer
      - run:
          name: "Install dependencies"
          command: composer install --no-interaction --prefer-dist

      # Verify that all PHP files have correct syntax
      - run:
          name: "Validate PHP syntax"
          command: find . -name "*.php" -exec php -l {} \; | grep "No syntax errors"

  deploy_to_pantheon:
    docker:
      - image: cimg/php:8.3
    steps:
      - checkout
      # Load the SSH key using the fingerprint from CircleCI settings
      - add_ssh_keys:
          fingerprints:
            - "SHA256:uL7NIIZNEuKTe7iqgNFxY6iFODB2fStmoq/mPS5UCyc"
      - run:
          name: "Install Terminus and Deploy to Pantheon"
          command: |
            # 1. Install Terminus CLI
            curl -L https://github.com -o terminus
            chmod +x terminus

            # 2. Authenticate with Pantheon
            ./terminus auth:login --machine-token="${TERMINUS_TOKEN}"

            # 3. Add Pantheon to known hosts to prevent SSH hanging
            ssh-keyscan -p 2222 codeserver.dev.${TERMINUS_SITE}.drush.in >> ~/.ssh/known_hosts

            # 4. Configure Git and push to Pantheon
            # Note: We use --force to ensure the Pantheon repo matches our GitHub "source of truth"
            git config --global user.email "circleci@example.com"
            git config --global user.name "CircleCI Deployer"
            git remote add pantheon ssh://codeserver.dev.${TERMINUS_SITE}@codeserver.dev.${TERMINUS_SITE}.drush.in:2222/~/repository.git
            git push pantheon main --force

# Orchestrate the jobs with workflows
workflows:
  version: 2
  main_workflow:
    jobs:
      - build_and_test
      - deploy_to_pantheon:
          requires:
            - build_and_test
          filters:
            branches:
              only: main # Only deploy when changes are pushed to the main branch
