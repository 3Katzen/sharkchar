version: 2.1

# Jobs define the individual steps of the CI/CD pipeline
jobs:
  build_and_test:
    docker:
      # We use a specific minor version of PHP 8.3 to ensure Drupal 11 compatibility
      - image: cimg/php:8.3.1
    steps:
      - checkout

      # Ensure Composer is up to date and check environment versions
      - run:
          name: "Environment check and Composer update"
          command: |
            sudo composer self-update
            php -v
            composer --version

      # Clean previous vendor and install dependencies
      - run:
          name: "Install project dependencies"
          command: |
            rm -rf vendor
            composer install --no-interaction --prefer-dist --optimize-autoloader

      # Validate syntax only on our code, excluding the vendor folder
      - run:
          name: "Validate PHP syntax"
          command: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \; | grep "No syntax errors"

  deploy_to_pantheon:
    docker:
      - image: cimg/php:8.3.1
    steps:
      - checkout
      # Load the SSH key for Pantheon authentication
      - add_ssh_keys:
          fingerprints:
            - "TU_FINGERPRINT_AQUI"
      - run:
          name: "Install Terminus and Deploy to Pantheon"
          command: |
            # 1. Download and install Terminus
            curl -L https://github.com -o terminus
            # Verify the file is not an HTML error before continuing
            if grep -q "<!DOCTYPE html>" terminus; then echo "Error: Downloaded HTML instead of binary"; exit 1; fi
            chmod +x terminus

            # 2. Authenticate with the machine token set in environment variables
            ./terminus auth:login --machine-token="${TERMINUS_TOKEN}"

            # 3. Prevent SSH key confirmation prompts
            ssh-keyscan -p 2222 codeserver.dev.${TERMINUS_SITE}.drush.in >> ~/.ssh/known_hosts

            # 4. Git deployment to Pantheon
            git config --global user.email "circleci@example.com"
            git config --global user.name "CircleCI Deployer"

            # Add Pantheon as a remote and push current main branch
            # We use --force to ensure Pantheon stays in sync with GitHub
            git remote add pantheon ssh://codeserver.dev.${TERMINUS_SITE}@codeserver.dev.${TERMINUS_SITE}.drush.in:2222/~/repository.git
            git push pantheon main --force

# Workflows coordinate the execution of jobs
workflows:
  version: 2
  main_workflow:
    jobs:
      - build_and_test
      - deploy_to_pantheon:
          requires:
            - build_and_test
          filters:
            branches:
              only: main # Only trigger deployment on the main branch
