version: 2.1

# Jobs define the individual steps of the CI/CD pipeline
jobs:
  build_and_test:
    docker:
      # We use a specific minor version of PHP 8.3 to ensure Drupal 11 compatibility
      - image: cimg/php:8.3.1
    steps:
      - checkout

      # Ensure Composer is up to date and check environment versions
      - run:
          name: "Environment check and Composer update"
          command: |
            sudo composer self-update
            php -v
            composer --version

      # Clean previous vendor and install dependencies
      - run:
          name: "Install project dependencies"
          command: |
            rm -rf vendor
            composer install --no-interaction --prefer-dist --optimize-autoloader

      # Validate syntax only on our code, excluding the vendor folder
      - run:
          name: "Validate PHP syntax"
          command: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \; | grep "No syntax errors"

  deploy_to_pantheon:
    docker:
      - image: cimg/php:8.3.1
    steps:
      - checkout
      # Load the SSH key for Pantheon authentication
      - add_ssh_keys:
          fingerprints:
            - "TU_FINGERPRINT_AQUI"
      - run:
          name: "Install Terminus and Deploy to Pantheon"
          command: |
            # 1. Dynamically find and download the latest Terminus release
            export TERMINUS_RELEASE=$(curl --silent "https://api.github.com/repos/pantheon-systems/terminus/releases/latest" | jq -r .tag_name)
            echo "Installing Terminus version: $TERMINUS_RELEASE"
            curl -L "https://github.com/pantheon-systems/terminus/releases/download/$TERMINUS_RELEASE/terminus.phar" -o terminus
            chmod +x terminus

            # 2. Verify it's a valid PHP binary
            ./terminus --version

            # 3. Wake up the Pantheon environment and get the specific host
            echo "Waking up Pantheon dev environment..."
            ./terminus env:wake ${TERMINUS_SITE}.dev

            # Use Terminus to get the exact connection string
            export PANTHEON_HOST=$(./terminus connection:info ${TERMINUS_SITE}.dev --field=git_host)
            export PANTHEON_REPO=$(./terminus connection:info ${TERMINUS_SITE}.dev --field=git_url)

            # Add the host to known_hosts to prevent hanging
            ssh-keyscan -p 2222 $PANTHEON_HOST >> ~/.ssh/known_hosts

            # 4. Git deployment to Pantheon
            git config --global user.email "circleci@example.com"
            git config --global user.name "CircleCI Deployer"

            # Make sure Pantheon is in Git mode
            ./terminus connection:set ${TERMINUS_SITE}.dev git

            # Add remote and push
            git remote add pantheon $PANTHEON_REPO
            git push pantheon main --force

# Workflows coordinate the execution of jobs
workflows:
  version: 2
  main_workflow:
    jobs:
      - build_and_test
      - deploy_to_pantheon:
          requires:
            - build_and_test
          filters:
            branches:
              only: main # Only trigger deployment on the main branch
