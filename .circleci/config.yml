version: 2.1

# Jobs define the individual steps of the CI/CD pipeline
jobs:
  build_and_test:
    docker:
      # We use a specific minor version of PHP 8.3 to ensure Drupal 11 compatibility
      - image: cimg/php:8.3.1
    steps:
      - checkout

      # Ensure Composer is up to date and check environment versions
      - run:
          name: "Environment check and Composer update"
          command: |
            sudo composer self-update
            php -v
            composer --version

      # Clean previous vendor and install dependencies
      - run:
          name: "Install project dependencies"
          command: |
            rm -rf vendor
            composer install --no-interaction --prefer-dist --optimize-autoloader

      # Validate syntax only on our code, excluding the vendor folder
      - run:
          name: "Validate PHP syntax"
          command: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \; | grep "No syntax errors"

  deploy_to_pantheon:
    docker:
      - image: cimg/php:8.3.1
    steps:
      - checkout
      # Load the SSH key for Pantheon authentication
      - add_ssh_keys:
          fingerprints:
            - "TU_FINGERPRINT_AQUI"
      - run:
          name: "Install Terminus and Deploy to Pantheon"
          command: |
            # 1. Install Terminus
            export TERMINUS_RELEASE=$(curl --silent "https://github.com" | jq -r .tag_name)
            curl -L "https://github.com" -o terminus
            chmod +x terminus

            # 2. Authenticate (Critical: We do this and then run the commands)
            ./terminus auth:login --machine-token="${TERMINUS_TOKEN}"

            # 3. Wake up and set Git Mode
            echo "Waking up Pantheon environment..."
            ./terminus env:wake ${TERMINUS_SITE}.dev
            ./terminus connection:set ${TERMINUS_SITE}.dev git

            # 4. Get dynamic connection info
            export PANTHEON_HOST=$(./terminus connection:info ${TERMINUS_SITE}.dev --field=git_host)
            export PANTHEON_REPO=$(./terminus connection:info ${TERMINUS_SITE}.dev --field=git_url)

            # 5. Configure SSH and Git
            ssh-keyscan -p 2222 $PANTHEON_HOST >> ~/.ssh/known_hosts
            git config --global user.email "circleci@example.com"
            git config --global user.name "CircleCI Deployer"

            # 6. Push to Pantheon
            # We use '|| true' on remote add in case it was already added in a retry
            git remote add pantheon $PANTHEON_REPO || true
            git push pantheon main --force

# Workflows coordinate the execution of jobs
workflows:
  version: 2
  main_workflow:
    jobs:
      - build_and_test
      - deploy_to_pantheon:
          requires:
            - build_and_test
          filters:
            branches:
              only: main # Only trigger deployment on the main branch
